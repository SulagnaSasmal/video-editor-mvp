services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: video_editor
      POSTGRES_PASSWORD: video_editor
      POSTGRES_DB: video_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
